spring:
  application:
    name: monoteBe
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
        format_sql: true
    show-sql: true
  datasource:
    url: jdbc:postgresql://localhost:5433/monote_postgres
    username: monote
    password: monote
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: trace
