spring:

  application:
    name: monoteBe

  jpa:
    properties:
      hibernate:
        ddl-auto: validate
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  datasource:
    url: jdbc:postgresql://localhost:5433/monote_postgres
    username: monote
    password: monote

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: trace

security:
  public-path: "/sign-up,/sign-in,/reset-password"
  encoder-strength: 12