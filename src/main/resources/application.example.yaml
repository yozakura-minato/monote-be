spring:
  application:
    name: monoteBe
  jpa:
    properties:
      hibernate:
        ddl-auto: validate
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    url: jdbc:postgresql://localhost:5433/monote_postgres
    # TODO 1/3: Enter your Username for PostgreSQL database here
    username: "YOUR_POSTGRESQL_USERNAME"
    # TODO 2/3: Enter your Password for PostgreSQL database here
    password: "YOUR_POSTGRESQL_PASSWORD"
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

logging:
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: trace


security:
  public-paths: "/api/sign-up,/api/sign-in,/api/refresh,/api/reset-password"
  password:
    encoder-strength: 12
  authentication:
    label: "Authorization"
    prefix: "Bearer "
    token-index: 7
  jwt:
    # TODO 3/3: Enter your Secret key for JWT signature here
    secret-key: "YOUR_JWT_SECRET_KEY"
    access-token:
      # 15 minutes
      expiration: 900_000
    refresh-token:
      # 15 days
      expiration: 1_296_000_000
      prefix: "jwt:refresh:"
    claims:
      user-id: "uid"

persistence:
  system-id: "00000000-0000-0000-0000-000000000000"